services:
  postgres:
    image: postgres:17
    container_name: fashop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fashop
      POSTGRES_USER: fashop
      POSTGRES_PASSWORD: fashop_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fashop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fashop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: fashop-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://fashop:fashop_secret@postgres:5432/fashop?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      PORT: "8080"
      ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: fashop-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
